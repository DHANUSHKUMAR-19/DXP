<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DXP — Product</title>
  <script>
    ;(function(win, doc, style, timeout) {
    var STYLE_ID = 'at-body-style';
    function getParent() { return doc.getElementsByTagName('head')[0]; }
    function addStyle(parent, id, def) {
      if (!parent) { return; }
      var style = doc.createElement('style');
      style.id = id; style.innerHTML = def;
      parent.appendChild(style);
    }
    function removeStyle(parent, id) {
      if (!parent) { return; }
      var style = doc.getElementById(id);
      if (!style) { return; }
      parent.removeChild(style);
    }
    addStyle(getParent(), STYLE_ID, style);
    setTimeout(function() { removeStyle(getParent(), STYLE_ID); }, timeout);
    }(window, document, "body {opacity: 0 !important}", 3000));
  </script>
  <script src="https://assets.adobedtm.com/01296dd00565/0817753d32bc/launch-7acbfa7da51d-development.min.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .pdp-body { padding: 2.5rem 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }

    .pdp-gallery { display: grid; grid-template-columns: 80px 1fr; gap: 1rem; }
    .pdp-thumbs  { display: flex; flex-direction: column; gap: 8px; }
    .pdp-thumb   { aspect-ratio: 1; background: var(--paper-warm); border-radius: var(--radius); cursor: pointer; border: 1.5px solid transparent; overflow: hidden; transition: border-color 0.15s; }
    .pdp-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .pdp-thumb.active { border-color: var(--accent); }
    .pdp-main-img { aspect-ratio: 3/4; background: var(--paper-warm); border-radius: var(--radius); overflow: hidden; position: relative; }
    .pdp-main-img img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s ease; }

    .pdp-brand { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 0.75rem; }
    .pdp-name  { font-family: var(--ff-display); font-size: 38px; font-weight: 400; line-height: 1.08; margin-bottom: 1rem; }
    .pdp-price { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
    .pdp-price .old  { font-size: 16px; text-decoration: line-through; color: var(--ink-mute); font-weight: 400; margin-right: 10px; }
    .pdp-price .sale { color: var(--danger); }
    .pdp-rating { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; }
    .stars { color: var(--accent); font-size: 14px; letter-spacing: 2px; }
    .rating-count { font-size: 13px; color: var(--ink-mute); }
    .pdp-divider { border: none; border-top: 0.5px solid var(--border); margin: 1.5rem 0; }
    .option-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 0.75rem; }
    .option-label strong { color: var(--ink); text-transform: none; letter-spacing: 0; font-size: 13px; }
    .color-options { display: flex; gap: 10px; margin-bottom: 1.5rem; }
    .color-opt { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 0.5px solid var(--border-strong); outline: 2px solid transparent; outline-offset: 3px; transition: outline-color 0.15s; }
    .color-opt.active { outline-color: var(--accent); }
    .size-options { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .size-btn { padding: 9px 15px; border: 0.5px solid var(--border); background: var(--white); font-size: 13px; cursor: pointer; border-radius: var(--radius); font-family: var(--ff-body); transition: all 0.15s; }
    .size-btn:hover { background: var(--paper-warm); }
    .size-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
    .size-btn.oos { color: var(--ink-mute); text-decoration: line-through; cursor: not-allowed; opacity: 0.5; }
    .pdp-actions { display: flex; gap: 10px; margin-bottom: 1.5rem; }
    .add-btn  { flex: 1; padding: 15px; background: var(--ink); color: var(--white); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; border-radius: var(--radius); font-family: var(--ff-body); transition: background 0.2s; }
    .add-btn:hover { background: var(--accent-dark); }
    .wish-btn { padding: 15px 18px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 18px; transition: all 0.15s; }
    .wish-btn:hover { border-color: var(--accent); color: var(--accent); }
    .accordion-item { border-top: 0.5px solid var(--border); }
    .accordion-btn  { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; font-size: 13px; letter-spacing: 0.06em; background: none; border: none; cursor: pointer; font-family: var(--ff-body); color: var(--ink); }
    .accordion-body { font-size: 14px; color: var(--ink-soft); line-height: 1.75; padding-bottom: 1rem; }
    .size-guide-link { font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: underline; text-underline-offset: 3px; margin-bottom: 1.5rem; display: inline-block; }
    .rec-section { padding: 0 2rem 5rem; }
    .rec-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.25rem; }
  </style>
  <!-- ADOBE LAUNCH EMBED
  <script src="https://assets.adobedtm.com/YOUR_PROPERTY_ID/launch-EN_XXXXX.min.js" async></script>
  -->
</head>
<body>
<div id="vaux-nav"></div>

<div class="breadcrumb container">
  <a href="index.html">Home</a>
  <span class="sep">/</span>
  <a href="#" id="bc-cat">Women</a>
  <span class="sep">/</span>
  <span id="bc-name">Product</span>
</div>

<div class="pdp-body">
  <div class="pdp-gallery">
    <div class="pdp-thumbs" id="pdp-thumbs"></div>
    <div class="pdp-main-img">
      <img id="pdp-main-img" src="" alt="">
    </div>
  </div>
  <div id="pdp-info">
    <p class="pdp-brand" id="pdp-brand"></p>
    <h1 class="pdp-name"  id="pdp-name"></h1>
    <div class="pdp-price" id="pdp-price"></div>
    <div class="pdp-rating">
      <span class="stars" id="pdp-stars">★★★★★</span>
      <span class="rating-count" id="pdp-rating-count"></span>
    </div>
    <hr class="pdp-divider">
    <p class="option-label">Colour: <strong id="selected-color-label">—</strong></p>
    <div class="color-options" id="color-options"></div>
    <p class="option-label">Size</p>
    <span class="size-guide-link">Size Guide</span>
    <div class="size-options" id="size-options"></div>
    <div class="pdp-actions">
      <button class="add-btn" id="add-btn" onclick="handleAddToCart()">Add to Bag</button>
      <button class="wish-btn">&#9825;</button>
    </div>
    <p style="font-size:13px;color:var(--ink-mute);margin-bottom:1.5rem">✓ &nbsp;Free returns within 30 days &nbsp;|&nbsp; 🔒 Secure checkout</p>
    <div class="accordion-item">
      <button class="accordion-btn" onclick="toggleAccordion(this)"><span>Product Details</span><span>+</span></button>
      <div class="accordion-body hidden" id="pdp-description"></div>
    </div>
    <div class="accordion-item">
      <button class="accordion-btn" onclick="toggleAccordion(this)"><span>Fabric &amp; Care</span><span>+</span></button>
      <div class="accordion-body hidden" id="pdp-fabric"></div>
    </div>
    <div class="accordion-item">
      <button class="accordion-btn" onclick="toggleAccordion(this)"><span>Delivery &amp; Returns</span><span>+</span></button>
      <div class="accordion-body hidden">Free standard delivery on orders over ₹2,999. Express delivery available. Free returns within 30 days.</div>
    </div>
  </div>
</div>

<section class="rec-section">
  <div class="section-header">
    <h2 class="section-title">You May Also Like</h2>
    <a class="section-link" href="plp.html?cat=All">View all &rarr;</a>
  </div>
  <div class="rec-grid" id="rec-grid"></div>
</section>

<div id="vaux-footer"></div>
<div id="vaux-toast"></div>

<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="js/footer.js"></script>
<script src="js/analytics.js"></script>
<script>
  VAUX.nav.init('');
  VAUX.footer.init();

  var params  = new URLSearchParams(window.location.search);
  var product = VAUX.getProductById(params.get('id'));

  if (product) {
    document.title = 'DXP — ' + product.name;
    document.getElementById('pdp-brand').textContent        = product.brand;
    document.getElementById('pdp-name').textContent         = product.name;
    document.getElementById('pdp-description').textContent  = product.description;
    document.getElementById('pdp-fabric').textContent       = product.fabric;
    document.getElementById('pdp-rating-count').textContent = product.rating + ' (' + product.reviewCount + ' reviews)';
    document.getElementById('bc-cat').textContent           = product.category;
    document.getElementById('bc-cat').href                  = 'plp.html?cat=' + product.category;
    document.getElementById('bc-name').textContent          = product.name;

    var full = Math.round(product.rating);
    document.getElementById('pdp-stars').textContent = '★'.repeat(full) + '☆'.repeat(5-full);

    document.getElementById('pdp-price').innerHTML = product.oldPrice
      ? '<span class="old">'+VAUX.fmt(product.oldPrice)+'</span><span class="sale">'+VAUX.fmt(product.price)+'</span>'
      : VAUX.fmt(product.price);

    // Main image
    var mainImg = document.getElementById('pdp-main-img');
    mainImg.src = product.images[0];
    mainImg.alt = product.name;

    // Thumbnails
    var thumbsWrap = document.getElementById('pdp-thumbs');
    product.images.forEach(function(imgSrc, i) {
      var thumb = document.createElement('div');
      thumb.className = 'pdp-thumb' + (i===0?' active':'');
      thumb.innerHTML = '<img src="'+imgSrc+'" alt="'+product.name+' view '+(i+1)+'" loading="lazy">';
      thumb.addEventListener('click', function() {
        document.querySelectorAll('.pdp-thumb').forEach(function(t){t.classList.remove('active');});
        thumb.classList.add('active');
        mainImg.style.opacity = '0';
        setTimeout(function(){ mainImg.src = imgSrc; mainImg.style.opacity = '1'; }, 180);
      });
      thumbsWrap.appendChild(thumb);
    });

    // Colours
    var selectedColor = product.images ? product.images[0] : 'Default';
    var colorNames = ['Ivory','Noir','Terracotta','Slate'];
    document.getElementById('selected-color-label').textContent = colorNames[0];
    var colorWrap = document.getElementById('color-options');
    (product.swatches||[]).forEach(function(hex,i) {
      var btn = document.createElement('div');
      btn.className = 'color-opt' + (i===0?' active':'');
      btn.style.background = hex;
      btn.title = colorNames[i] || hex;
      btn.onclick = function() {
        document.querySelectorAll('.color-opt').forEach(function(c){c.classList.remove('active');});
        btn.classList.add('active');
        selectedColor = colorNames[i] || hex;
        document.getElementById('selected-color-label').textContent = selectedColor;
      };
      colorWrap.appendChild(btn);
    });

    // Sizes
    var selectedSize = null;
    var sizeWrap = document.getElementById('size-options');
    product.sizes.forEach(function(sz) {
      var btn = document.createElement('button');
      btn.className = 'size-btn' + (product.outOfStock.includes(sz)?' oos':'');
      btn.textContent = sz;
      if (!product.outOfStock.includes(sz)) {
        btn.onclick = function() {
          document.querySelectorAll('.size-btn:not(.oos)').forEach(function(b){b.classList.remove('active');});
          btn.classList.add('active'); selectedSize = sz;
        };
      }
      sizeWrap.appendChild(btn);
    });

    window.handleAddToCart = function() {
      if (!selectedSize) { showToast('Please select a size'); return; }
      VAUX.addToCart(product.id, selectedSize, selectedColor, 1);
      VAUX.analytics.addToCart(product, selectedSize, selectedColor, 1);
      showToast(product.name + ' added to bag');
    };

    // Recommendations
    var recs = VAUX.PRODUCTS.filter(function(p){return p.id!==product.id;}).slice(0,4);
    document.getElementById('rec-grid').innerHTML = recs.map(function(p) {
      return `<div class="product-card" onclick="VAUX.analytics.trackedNavigate('${p.name}', 'recommendations', 'pdp.html?id=${p.id}')">
        <div class="product-img-wrap">
          <img src="${p.image}" alt="${p.name}" loading="lazy">
          ${p.tag?`<span class="product-tag ${p.tag.toLowerCase()}">${p.tag}</span>`:''}
          <div class="product-actions">
            <button class="product-action-btn" onclick="event.stopPropagation();VAUX.addToCart(${p.id},'M','Default',1);VAUX.analytics.addToCart(VAUX.getProductById(${p.id}),'M','Default',1);showToast('${p.name} added to bag')">Quick Add</button>
            <button class="product-action-btn wish" onclick="event.stopPropagation()">&#9825;</button>
          </div>
        </div>
        <p class="product-brand">${p.brand}</p>
        <p class="product-name">${p.name}</p>
        <p class="product-price">${p.oldPrice?'<span class="old">'+VAUX.fmt(p.oldPrice)+'</span><span class="sale">'+VAUX.fmt(p.price)+'</span>':VAUX.fmt(p.price)}</p>
      </div>`;
    }).join('');

    VAUX.analytics.productDetailView(product);
    VAUX.analytics.pageView({ pageName:'dxp:pdp:'+product.name.toLowerCase().replace(/ /g,'-'), pageType:'pdp', siteSectionL1:product.category, siteSectionL2:product.subCategory, channel:'ecommerce' });
  }

  function toggleAccordion(btn) {
    var body = btn.nextElementSibling;
    var open = !body.classList.contains('hidden');
    body.classList.toggle('hidden', open);
    btn.querySelector('span:last-child').textContent = open?'+':'-';
  }
  function showToast(msg) {
    var t=document.getElementById('vaux-toast'); t.textContent=msg; t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');},2600);
  }
</script>
</body>
</html>
